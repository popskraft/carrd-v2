(function(){'use strict';const DEFAULTS={enabled:true,cardSelector:'.cards',defaultCardBg:'var(--theme-card-bg-default)'};const externalOptions=(typeof window!=='undefined'&&window.CarrdPluginOptions&&window.CarrdPluginOptions.cards)||{};const CONFIG={...DEFAULTS,...externalOptions};const SELECTORS={cardItem:'theme-card-item'};const PADDING_PROPERTIES=['padding','padding-top','padding-right','padding-bottom','padding-left'];const requestFrame=window.requestAnimationFrame||(cb=>setTimeout(cb,16));let pendingPaddingSync=false;const parsePadding=val=>{if(!val)return null;return val.split(' ').map(v=>!isNaN(v)?v+'rem':v).join(' ');};const getContainerPaddingValues=style=>[style.paddingTop,style.paddingRight,style.paddingBottom,style.paddingLeft];const hasNonZeroPadding=paddingValues=>paddingValues.some(value=>parseFloat(value)!==0);function getPaddingTargets(container){const inner=container.querySelector(':scope > .wrapper > .inner');return inner?[container,inner]:[container];}function readInlinePaddingStyles(element){return PADDING_PROPERTIES.reduce((styles,property)=>{styles[property]={value:element.style.getPropertyValue(property),priority:element.style.getPropertyPriority(property)};return styles;},{});}function hasMeaningfulInlinePadding(styles){return Object.values(styles).some(({value})=>value&&parseFloat(value)!==0);}function captureAuthorPaddingStyles(element){const currentStyles=readInlinePaddingStyles(element);if(!element.__themeCardsOriginalPaddingStyles||hasMeaningfulInlinePadding(currentStyles)){element.__themeCardsOriginalPaddingStyles=currentStyles;}}function restoreAuthorPaddingStyles(element){const styles=element.__themeCardsOriginalPaddingStyles||{};PADDING_PROPERTIES.forEach(property=>{const styleState=styles[property];if(styleState&&styleState.value){element.style.setProperty(property,styleState.value,styleState.priority);}else{element.style.removeProperty(property);}});}function resetElementPadding(element){PADDING_PROPERTIES.forEach(property=>{ele
