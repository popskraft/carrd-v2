<style>
.theme-header-nav-toggle{position:var(--theme-header-nav-toggle-position,fixed);top:var(--theme-header-nav-toggle-top,1rem);right:var(--theme-header-nav-toggle-right,1rem);width:var(--theme-header-nav-toggle-size,46px);height:var(--theme-header-nav-toggle-size,46px);display:none;align-items:center;justify-content:center;flex-direction:column;gap:var(--theme-header-nav-bar-gap,5px);padding:0;border:none;border-radius:var(--theme-header-nav-toggle-radius,0.5rem);background:var(--theme-header-nav-toggle-bg,rgba(255,255,255,0.2));-webkit-backdrop-filter:var(--theme-header-nav-toggle-backdrop,blur(10px));backdrop-filter:var(--theme-header-nav-toggle-backdrop,blur(10px));color:var(--theme-header-nav-bar-color,var(--theme-color-primary-dark,currentColor));cursor:pointer;z-index:var(--theme-header-nav-toggle-z-index,100000)}.theme-header-nav-toggle:focus-visible{outline:var(--theme-header-nav-toggle-outline,2px solid currentColor);outline-offset:var(--theme-header-nav-toggle-outline-offset,2px)}.theme-header-nav-toggle-bar{width:var(--theme-header-nav-bar-width,22px);height:var(--theme-header-nav-bar-height,2px);background:var(--theme-header-nav-bar-color,var(--theme-color-primary-dark,currentColor));border-radius:var(--theme-header-nav-bar-radius,999px);transition:opacity var(--theme-header-nav-duration,300ms)ease,transform var(--theme-header-nav-duration,300ms)ease}@media(max-width:736px){#header .theme-header-nav-toggle{display:inline-flex}#header .theme-header-nav-primary-section{position:relative}#header:not(.is-nav-open) .header-mobile-el-collapsing{display:none !important}}#header.is-nav-open .theme-header-nav-toggle-bar:nth-child(1),#header.is-nav-open .theme-header-nav-toggle-bar:nth-child(3){opacity:0;transform:scaleX(0.2)}#header.is-nav-open .theme-header-nav-toggle-bar:nth-child(2){opacity:1;transform:none}

<script>
(function(){'use strict';const CONFIG={breakpoint:736,closeOnLinkClick:true,...((window.CarrdPluginOptions&&window.CarrdPluginOptions.headerNav)||{})};const HEADER_SELECTOR='#header';const COLLAPSING_SELECTOR='.header-mobile-el-collapsing';const CLASSNAMES={open:'is-nav-open',primarySection:'theme-header-nav-primary-section',toggle:'theme-header-nav-toggle',toggleBar:'theme-header-nav-toggle-bar'};const INSTANCES=[];let globalsBound=false;function createToggle(){const button=document.createElement('button');button.type='button';button.className=CLASSNAMES.toggle;button.setAttribute('aria-label','Toggle navigation');button.setAttribute('aria-expanded','false');for(let i=0;i<3;i+=1){const bar=document.createElement('span');bar.className=CLASSNAMES.toggleBar;button.appendChild(bar);}return button;}function resolvePrimarySection(header){const inner=header.querySelector('.wrapper > .inner')||header.querySelector('.inner')||header.querySelector('.wrapper')||header;return inner.firstElementChild||inner;}function bindGlobals(){if(globalsBound||!INSTANCES.length)return;globalsBound=true;let resizeTimer;window.addEventListener('resize',()=>{clearTimeout(resizeTimer);resizeTimer=setTimeout(()=>{INSTANCES.forEach(i=>i.onResize());},60);});document.addEventListener('keydown',event=>{if(event.key!=='Escape')return;INSTANCES.forEach(i=>{if(i.isOpen())i.close(true);});});}function initializeHeader(header){if(header.getAttribute('data-header-nav-bound')==='true')return;if(!header.querySelector(COLLAPSING_SELECTOR))return;header.setAttribute('data-header-nav-bound','true');const primarySection=resolvePrimarySection(header);primarySection.classList.add(CLASSNAMES.primarySection);const toggle=header.querySelector('.'+CLASSNAMES.toggle)||createToggle();if(toggle.parentNode!==primarySection){primarySection.appendChild(toggle);}const isMobile=()=>window.innerWidth<=CONFIG.breakpoint;const revealHeader=()=>{const reduceMotion=window.matchMedia&&window.matchMedia('(prefers-reduced-motion: reduce)').matches;if(header.getBoundingClientRect().top<0){header.scrollIntoView({behavior:reduceMotion?'auto':'smooth',block:'start'});}};const setOpen=(open,options)=>{options=options||{};header.classList.toggle(CLASSNAMES.open,open);toggle.setAttribute('aria-expanded',open?'true':'false');if(open&&isMobile())revealHeader();if(!open&&options.restoreFocus)toggle.focus();};const onResize=()=>{if(!isMobile())setOpen(false);};toggle.addEventListener('click',()=>{if(!isMobile())return;setOpen(!header.classList.contains(CLASSNAMES.open));});if(CONFIG.closeOnLinkClick){header.addEventListener('click',event=>{if(!isMobile())return;const link=event.target.closest('a');if(link&&header.contains(link))setOpen(false);});}INSTANCES.push({onResize:onResize,isOpen:()=>header.classList.contains(CLASSNAMES.open),close:restoreFocus=>setOpen(false,{restoreFocus:restoreFocus})});onResize();}function init(){document.querySelectorAll(HEADER_SELECTOR).forEach(initializeHeader);bindGlobals();}if(document.readyState==='loading'){document.addEventListener('DOMContentLoaded',init);}else{init();}})();
