<script>
(function(){'use strict';const DEFAULTS={enabled:true,cardSelector:'[data-cards]'};const externalOptions=(typeof window!=='undefined'&&((window.CarrdPluginOptions&&window.CarrdPluginOptions.cards)))||{};const CONFIG={...DEFAULTS,...externalOptions};const SELECTORS={cardItem:'theme-card-item'};const PADDING_PROPERTIES=['padding','padding-top','padding-right','padding-bottom','padding-left'];const requestFrame=window.requestAnimationFrame||(cb=>setTimeout(cb,16));let pendingPaddingSync=false;const getContainerPaddingValues=style=>[style.paddingTop,style.paddingRight,style.paddingBottom,style.paddingLeft];const hasNonZeroPadding=paddingValues=>paddingValues.some(value=>parseFloat(value)!==0);function getFirstAttribute(container,attributes){for(const attribute of attributes){const value=container.getAttribute(attribute);if(value!==null&&value!==''){return value;}}return null;}function getPaddingTargets(container){const inner=container.querySelector(':scope > .wrapper > .inner');return inner?[container,inner]:[container];}function readInlinePaddingStyles(element){return PADDING_PROPERTIES.reduce((styles,property)=>{styles[property]={value:element.style.getPropertyValue(property),priority:element.style.getPropertyPriority(property)};return styles;},{});}function hasMeaningfulInlinePadding(styles){return Object.values(styles).some(({value})=>value&&parseFloat(value)!==0);}function captureAuthorPaddingStyles(element){const currentStyles=readInlinePaddingStyles(element);if(!element.__themeCardsOriginalPaddingStyles||hasMeaningfulInlinePadding(currentStyles)){element.__themeCardsOriginalPaddingStyles=currentStyles;}}function restoreAuthorPaddingStyles(element){const styles=element.__themeCardsOriginalPaddingStyles||{};PADDING_PROPERTIES.forEach(property=>{const styleState=styles[property];if(styleState&&styleState.value){element.style.setProperty(property,styleState.value,styleState.priority);}else{element.style.removeProperty(property);}});}function resetElementPadding(element){PADDING_PROPERTIES.forEach(property=>{element.style.removeProperty(property);});element.style.setProperty('padding','0px','important');}function getInheritedPadding(container){const paddingTargets=getPaddingTargets(container).reverse();for(const element of paddingTargets){const paddingValues=getContainerPaddingValues(window.getComputedStyle(element));if(hasNonZeroPadding(paddingValues)){return paddingValues.join(' ');}}return null;}function syncCardPadding(container){const paddingTargets=getPaddingTargets(container);paddingTargets.forEach(captureAuthorPaddingStyles);paddingTargets.forEach(restoreAuthorPaddingStyles);const inheritedPadding=getInheritedPadding(container);if(inheritedPadding){container.style.setProperty('--theme-card-padding',inheritedPadding);container.style.removeProperty('--theme-card-padding-mobile');}else{const dataPadding=getFirstAttribute(container,['data-cards-padding','data-padding']);const dataPaddingMobile=getFirstAttribute(container,['data-cards-padding-mobile','data-padding-mobile']);if(dataPadding){const normalizedPadding=dataPadding.split(/\s+/).map(val=>{const num=parseFloat(val);return isNaN(num)?val:`${num}rem`;}).join(' ');container.style.setProperty('--theme-card-padding',normalizedPadding);}else{container.style.removeProperty('--theme-card-padding');}if(dataPaddingMobile){const num=parseFloat(dataPaddingMobile);const normalizedMobile=isNaN(num)?dataPaddingMobile:`${num}rem`;container.style.setProperty('--theme-card-padding-mobile',normalizedMobile);}else{container.style.removeProperty('--theme-card-padding-mobile');}}paddingTargets.forEach(resetElementPadding);}function syncAllCardPaddings(){document.querySelectorAll(`${CONFIG.cardSelector}[data-cards-initialized="true"]`).forEach(container=>syncCardPadding(container));}function scheduleAllCardPaddings(){if(pendingPaddingSync)return;pendingPaddingSync=true;requestFrame(()=>{pendingPaddingSync=false;syncAllCardPaddings();});}function bindPaddingSync(){if(window.__themeCardsPaddi
