<script>
(function(){'use strict';const CONFIG={breakpoint:736,closeOnLinkClick:true,...((window.CarrdPluginOptions&&window.CarrdPluginOptions.headerNav)||{})};const HEADER_SELECTOR='#header';const COLLAPSING_SELECTOR='.header-mobile-hide, .header-mobile-el-collapsing';const CLASSNAMES={open:'is-nav-open',primarySection:'theme-header-nav-primary-section',toggle:'theme-header-nav-toggle',toggleBar:'theme-header-nav-toggle-bar'};const INSTANCES=[];let globalsBound=false;function createToggle(){const button=document.createElement('button');button.type='button';button.className=CLASSNAMES.toggle;button.setAttribute('aria-label','Toggle navigation');button.setAttribute('aria-expanded','false');for(let i=0;i<3;i+=1){const bar=document.createElement('span');bar.className=CLASSNAMES.toggleBar;button.appendChild(bar);}return button;}function resolvePrimarySection(header){const inner=header.querySelector('.wrapper > .inner')||header.querySelector('.inner')||header.querySelector('.wrapper')||header;return inner.firstElementChild||inner;}function bindGlobals(){if(globalsBound||!INSTANCES.length)return;globalsBound=true;let resizeTimer;window.addEventListener('resize',()=>{clearTimeout(resizeTimer);resizeTimer=setTimeout(()=>{INSTANCES.forEach(i=>i.onResize());},60);});document.addEventListener('keydown',event=>{if(event.key!=='Escape')return;INSTANCES.forEach(i=>{if(i.isOpen())i.close(true);});});}function initializeHeader(header){if(header.getAttribute('data-header-nav-bound')==='true')return;if(!header.querySelector(COLLAPSING_SELECTOR))return;header.setAttribute('data-header-nav-bound','true');const primarySection=resolvePrimarySection(header);primarySection.classList.add(CLASSNAMES.primarySection);const toggle=header.querySelector('.'+CLASSNAMES.toggle)||createToggle();if(toggle.parentNode!==primarySection){primarySection.appendChild(toggle);}const isMobile=()=>window.innerWidth<=CONFIG.breakpoint;const revealHeader=()=>{const reduceMotion=window.matchMedia&&window.matchMedia('(pref
